# ─────────────────────────────────────────────
#  DOCKER COMPOSE — development environment
# ─────────────────────────────────────────────
#  Runs two services:
#    1. neon-local  → proxy to Neon Cloud (ephemeral branch)
#    2. app         → your Express app (hot-reload)
#
#  🔧 BEFORE FIRST RUN:
#     1. Fill in .env.development with your
#        NEON_API_KEY, NEON_PROJECT_ID, and
#        PARENT_BRANCH_ID (from Neon Console).
#     2. Run: docker compose -f docker-compose.dev.yml up
#
#  The app connects to Neon Local at
#  postgres://neon:npg@neon-local:5432/neondb
#  (user: neon, password: npg).
#
#  Source is mounted as a volume — edit files
#  locally and the container auto-restarts.
# ─────────────────────────────────────────────

services:
  neon-local:
    image: neondatabase/neon_local:latest
    ports:
      - "5432:5432"
    environment:
      NEON_API_KEY: ${NEON_API_KEY}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID}
      PARENT_BRANCH_ID: ${PARENT_BRANCH_ID}
    env_file:
      - .env.development

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://neon:npg@neon-local:5432/neondb?sslmode=require
      NEON_FETCH_ENDPOINT: http://neon-local:5432/sql
      ARCJET_KEY: ${ARCJET_KEY}
    env_file:
      - .env.development
    depends_on:
      - neon-local
    volumes:
      - .:/app
      - /app/node_modules
    command: node --watch src/index.js
